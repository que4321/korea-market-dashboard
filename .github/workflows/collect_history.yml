name: 시장 데이터 수집 (매일 07:00 KST)

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 평일 UTC 22:00 = KST 07:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          pip install yfinance pytz

      - name: 시장 데이터 수집
        run: python collect_history.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git diff --staged --quiet || git commit -m "chore: 시장 데이터 업데이트 $(date +'%Y-%m-%d %H:%M KST')"
          git push
