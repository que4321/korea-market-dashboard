name: 투자자 데이터 수집 (매일 18:00 KST)

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pytz

      - name: 투자자 데이터 수집
        run: |
          python collect_investor.py

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/investor_data.json
          git diff --staged --quiet || git commit -m "chore: investor data $(date +'%Y-%m-%d %H:%M') KST"
          git push
